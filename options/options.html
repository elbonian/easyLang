<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="options.css" />
  <title>easyLang Settings</title>
</head>
<body>
  <main class="card">
    <header class="card-header">
      <span class="logo">あ</span>
      <div>
        <h1>easyLang Settings</h1>
        <p class="subtitle">Configure your OpenAI-compliant LLM endpoint.</p>
      </div>
    </header>

    <form id="settings-form" class="form">
      <div class="field">
        <label for="endpoint">API Endpoint URL <span class="req">*</span></label>
        <input type="url" id="endpoint" placeholder="https://api.example.com/v1/chat/completions" required />
        <small>Full chat completions URL.</small>
      </div>

      <div class="field">
        <label for="apiKey">API Key <span class="req">*</span></label>
        <div class="key-row">
          <input type="password" id="apiKey" placeholder="sk-…" required />
          <button type="button" id="toggle-key" class="ghost-btn">Show</button>
        </div>
      </div>

      <div class="field">
        <label for="model">Model Name</label>
        <input type="text" id="model" placeholder="deepseek-ai/deepseek-v4-flash" />
        <small>Defaults to <code>deepseek-ai/deepseek-v4-flash</code>.</small>
      </div>

      <div class="field">
        <label for="temperature">Temperature</label>
        <input type="number" id="temperature" min="0" max="2" step="0.1" />
        <small>Range 0–2. Default 0.2.</small>
      </div>

      <div class="field">
        <label for="timeout">Request Timeout (seconds)</label>
        <input type="number" id="timeout" min="5" max="180" step="5" />
        <small>How long to wait for each API response. Range 5–180. Default 60. Increase if free endpoints time out.</small>
      </div>

      <div class="actions">
        <button type="submit" class="primary-btn">Save</button>
        <span id="save-status" class="save-status"></span>
      </div>
    </form>
  </main>

  <script src="options.js"></script>
</body>
</html>
